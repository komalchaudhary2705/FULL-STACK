<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class-One</title>
    <style>
      body {
        /* width: 80%; */
        /* margin: auto; */
        display: flex;
        height: 100vh;
        display: flex;
        justify-content: center;
        font-family: Arial, Helvetica, sans-serif;
      }
      .container {
        width: 80%;
        display: flex;
        flex-direction: column;
        border: 2px solid red;
        padding: 10px;
        background-color: #c4e6e1;
      }
      .header,
      .footer {
        width: 100%;
        text-align: center;
      }
      .footer {
        background-color: cadetblue;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100px;
      }
      .header {
        display: flex;
        align-items: conter;
        justify-content: space-between;
        background-color: #fff;
        border-top: 1px solid black;
        border-right: 1px solid black;
        border-left: 1px solid black;
        /* padding: 10px 0; */
      }
      .header h1,
      .header p {
        margin: 0;
      }
      .header-content{
        padding-right: 15px;
        padding-top: 10px;
      }
      .content-main {
        width: 100%;
        height: 80vh;
        display: flex;
      }
      .side-bar {
        background-color: antiquewhite;
        width: 200px;
        padding: 10px;
        border-top: 1px solid black;
        border-bottom: 1px solid black;
        border-left: 1px solid black;
      }
      ul {
        list-style: none;
        padding: 0;
      }
      ul li {
        /* padding: 20px; */
        background-color: white;
        border-radius: 10px;
        margin-bottom: 10px;
        /* text-align: center; */
        padding: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      ul li a{
        text-decoration: none;
      }
      li span{
        font-size: 30px;
      }
      .content-box {
        flex: 1;
        background-color: bisque;
        border: 1px solid black;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .box{
        background-color: aquamarine;
        flex: 1;
        border-radius: 5px;
        padding: 10px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcScJ5qbaYDvwTlawgrZGIe0uIs7OPgwU5D7B-7sv3ybkA&s=10"
            alt=""
            width="140px"
            height="auto"
          />
        </div>
        <div class="header-content">
          <h1>My Website Header</h1>
          <p>Welcome to my website</p>
        </div>
      </div>
      <div class="content-main">
        <div class="side-bar">
          <ul>
            <li><a href="home.html">Home</a> <span>*</span></li>
            <li><a href="about.html">About</a> <span>*</span></li>
            <li><a href="contect.html">Contect</a> <span>*</span></li>
           
          </ul>
        </div>
        <div class="content-box">
            <div class="box">box 1</div>
            <div class="box">box 2</div>
            <div class="box"> box 3</div>
            <div class="box">box 4</div>
        </div>
      </div>
      <div class="footer">Footer</div>
    </div>
  </body>
</html>
